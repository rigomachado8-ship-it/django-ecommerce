<!DOCTYPE html>
<html>
<head>
    <title>Delete Store</title>
</head>
<body>
    <h1>Delete Store</h1>
    <p>Are you sure you want to delete "{{ store.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <p><a href="{% url 'store:vendor_store_list' %}">Cancel</a></p>
</body>
</html>
