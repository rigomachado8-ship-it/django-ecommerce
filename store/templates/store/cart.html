{% extends 'store/base.html' %}

{% block content %}
<h2>Your Cart</h2>

<table>
    <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>
    </tr>

    {% for item in cart %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>${{ item.product.price }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

<a href="{% url 'checkout' %}">Proceed to Checkout</a>
