{% extends "store/base.html" %}

{% block title %}Login | Django eCommerce{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="mb-4">Login</h2>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <div class="mt-3">
                    <p class="mb-2">
                        <a href="{% url 'store:register' %}">Create an account</a>
                    </p>
                    <p class="mb-0">
                        <a href="{% url 'store:forgot_password' %}">Forgot your password?</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
