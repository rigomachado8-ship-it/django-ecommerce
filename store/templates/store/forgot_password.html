{% extends "store/base.html" %}
{% block content %}
<h2>Forgot Password</h2>

{% if error %}
<p>{{ error }}</p>
{% endif %}

{% if success %}
<p>{{ success }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <label>Email:</label>
    <input type="email" name="email" required>
    <button type="submit">Send Reset Email</button>
</form>
{% endblock %}
