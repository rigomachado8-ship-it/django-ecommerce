{% extends "store/base.html" %}

{% block title %}Reset Password | Django eCommerce{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Reset Your Password</h2>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" action="{% url 'store:reset_password' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="password_conf" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Reset Password
        </button>
    </form>
</div>
{% endblock %}
