<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django eCommerce{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn {
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .navbar-brand {
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'store:home' %}">eCommerce</a>

        <div class="d-flex align-items-center gap-2">
            {% if user.is_authenticated %}
                <span class="text-white small me-2">Hi, {{ user.username }}</span>
            {% endif %}

            <a class="btn btn-outline-light btn-sm" href="{% url 'store:home' %}">Home</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'store:reddit_feed' %}">Reddit Feed</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'store:cart_detail' %}">Cart</a>
        </div>
    </div>
</nav>

<main class="container py-5 flex-grow-1" style="max-width: 900px;">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <small>© 2026 Django eCommerce</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
